name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "MC-Pack-Updater" mod_updater.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MC-Pack-Updater
          path: dist/MC-Pack-Updater.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: "MC-Pack-Updater build #${{ github.run_number }}"
          files: dist/MC-Pack-Updater.exe
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
