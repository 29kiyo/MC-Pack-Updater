name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller

      # ── onedir → zip ──
      - name: Build (onedir)
        run: |
          pyinstaller --onedir --windowed --noupx --name "MC-Pack-Updater" `
            --version-file version_info.txt `
            mod_updater.py

      - name: Zip onedir
        run: Compress-Archive -Path dist\MC-Pack-Updater -DestinationPath dist\MC-Pack-Updater.zip

      # ── onefile → exe ──
      - name: Clean build cache
        run: Remove-Item -Recurse -Force build, dist\MC-Pack-Updater -ErrorAction SilentlyContinue

      - name: Build (onefile)
        run: |
          pyinstaller --onefile --windowed --noupx --name "MC-Pack-Updater" `
            --version-file version_info.txt `
            mod_updater.py

      # ── Release ──
      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: MC-Pack-Updater-zip
          path: dist\MC-Pack-Updater.zip

      - name: Upload artifact (exe)
        uses: actions/upload-artifact@v4
        with:
          name: MC-Pack-Updater-exe
          path: dist\MC-Pack-Updater.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: "MC-Pack-Updater build #${{ github.run_number }}"
          files: |
            dist\MC-Pack-Updater.zip
            dist\MC-Pack-Updater.exe
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
