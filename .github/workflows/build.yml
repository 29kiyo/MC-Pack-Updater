name: Build EXE

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller pymupdf requests

      # ── onedir → zip ──
      - name: Build (onedir)
        run: |
          pyinstaller --onedir --windowed --noupx --name "MC-Pack-Updater" `
            --icon assets\icon.ico `
            --add-data "assets\icon.ico;." `
            --add-data "assets\API Key Guide.pdf;." `
            --add-data "src\plugin_updater.py;." `
            --version-file assets\version_info.txt `
            src\mod_updater.py

      - name: Zip onedir
        run: Compress-Archive -Path dist\MC-Pack-Updater -DestinationPath dist\MC-Pack-Updater.zip

      # ── onefile → exe ──
      - name: Clean build cache
        run: Remove-Item -Recurse -Force build, dist\MC-Pack-Updater -ErrorAction SilentlyContinue

      - name: Build (onefile)
        run: |
          pyinstaller --onefile --windowed --noupx --name "MC-Pack-Updater" `
            --icon assets\icon.ico `
            --add-data "assets\icon.ico;." `
            --add-data "assets\API Key Guide.pdf;." `
            --add-data "src\plugin_updater.py;." `
            --version-file assets\version_info.txt `
            src\mod_updater.py

      # ── 直前のReleaseをプレリリースに変更（手動実行時のみ） ──
      - name: Mark previous release as prerelease
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $releases = gh release list --limit 2 --json tagName | ConvertFrom-Json
          if ($releases.Count -ge 2) {
            $prevTag = $releases[1].tagName
            gh release edit $prevTag --prerelease
            Write-Host "Marked $prevTag as prerelease"
          }

      # ── Release（手動実行時のみ） ──
      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v6
        with:
          name: MC-Pack-Updater-zip
          path: dist\MC-Pack-Updater.zip

      - name: Upload artifact (exe)
        uses: actions/upload-artifact@v6
        with:
          name: MC-Pack-Updater-exe
          path: dist\MC-Pack-Updater.exe

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: build-${{ github.run_number }}
          name: "MC-Pack-Updater build #${{ github.run_number }}"
          files: |
            dist\MC-Pack-Updater.zip
            dist\MC-Pack-Updater.exe
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
